<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Quiz - Configuration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .theme-card input:checked + div { border-color: #2563eb; background-color: #eff6ff; }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="setup-ui" class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
        <h1 class="text-3xl font-black mb-2 italic uppercase tracking-tighter text-slate-900">Le Super Quiz</h1>
        <p class="text-slate-500 mb-8 font-medium">Configure ton challenge personnalisé.</p>

        <div class="mb-8">
            <label class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4 block">1. Sélectionne les thèmes</label>
            <div id="themes-grid" class="grid grid-cols-2 gap-3">
                </div>
        </div>

        <div class="mb-10">
            <label class="text-xs font-black uppercase tracking-widest text-slate-400 mb-2 block">2. Nombre de questions : <span id="qty-val" class="text-blue-600">15</span></label>
            <input type="range" id="qty-range" min="5" max="40" value="15" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
        </div>

        <button onclick="startChallenge()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-blue-200 hover:scale-[1.02] transition-transform">
            LANCER LE CHALLENGE
        </button>
    </div>

    <div id="quiz-ui" class="hidden max-w-xl mx-auto mt-10">
        <div id="question-card" class="bg-white p-8 rounded-[2.5rem] shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <span id="theme-tag" class="bg-slate-100 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest text-slate-500">Thème</span>
                <span id="progress" class="text-xs font-bold text-slate-400">0/0</span>
            </div>
            <h2 id="question-text" class="text-2xl font-bold text-slate-800 mb-8 leading-tight">Chargement...</h2>
            <div id="options" class="space-y-3"></div>
        </div>
    </div>

    <script>
        let pool = [];
        let challengeQuestions = [];
        let currentIndex = 0;
        let score = 0;

        const THEMES_POSSIBLES = ["POLITIQUE FR", "INTERNATIONAL", "ÉCONOMIE", "SOCIÉTÉ", "ENVIRONNEMENT", "TECH / SCIENCE", "SANTÉ", "CULTURE", "SPORT", "JUSTICE"];

        // 1. Initialisation : On crée la grille de thèmes
        const grid = document.getElementById('themes-grid');
        THEMES_POSSIBLES.forEach(t => {
            grid.innerHTML += `
                <label class="theme-card cursor-pointer">
                    <input type="checkbox" name="theme-choice" value="${t}" checked class="hidden">
                    <div class="border-2 border-slate-100 p-4 rounded-2xl text-[10px] font-black uppercase text-center transition-all hover:bg-slate-50">
                        ${t}
                    </div>
                </label>
            `;
        });

        document.getElementById('qty-range').oninput = function() { document.getElementById('qty-val').innerText = this.value; };

        // 2. Lancement
        async function startChallenge() {
            const selectedThemes = Array.from(document.querySelectorAll('input[name="theme-choice"]:checked')).map(i => i.value);
            const limit = parseInt(document.getElementById('qty-range').value);

            if(selectedThemes.length === 0) return alert("Choisis au moins un thème !");

            // Chargement des données
            try {
                const res = await fetch('manifest.json');
                const manifest = await res.json();
                
                for(let item of manifest) {
                    const r = await fetch(`${item.folder}/metadata.json`);
                    const meta = await r.json();
                    // On filtre par thèmes choisis
                    const filtered = meta.questions.filter(q => selectedThemes.includes(q.theme));
                    pool.push(...filtered);
                }

                if(pool.length === 0) return alert("Aucune question trouvée pour ces thèmes.");

                // Mélange et slice
                challengeQuestions = pool.sort(() => Math.random() - 0.5).slice(0, limit);
                
                document.getElementById('setup-ui').classList.add('hidden');
                document.getElementById('quiz-ui').classList.remove('hidden');
                showQuestion();
            } catch(e) { console.error(e); }
        }

        function showQuestion() {
            const q = challengeQuestions[currentIndex];
            document.getElementById('theme-tag').innerText = q.theme;
            document.getElementById('progress').innerText = `${currentIndex + 1}/${challengeQuestions.length}`;
            document.getElementById('question-text').innerText = q.q;
            
            const optContainer = document.getElementById('options');
            optContainer.innerHTML = "";
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl border-2 border-slate-100 font-bold hover:bg-slate-50 transition";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i);
                optContainer.appendChild(btn);
            });
        }

        function checkAnswer(idx) {
            const q = challengeQuestions[currentIndex];
            const btns = document.getElementById('options').children;
            
            if(idx === q.correct) {
                btns[idx].classList.replace('border-slate-100', 'border-green-500');
                btns[idx].classList.add('bg-green-50');
                score++;
            } else {
                btns[idx].classList.replace('border-slate-100', 'border-red-500');
                btns[idx].classList.add('bg-red-50');
                btns[q.correct].classList.replace('border-slate-100', 'border-green-500');
            }

            setTimeout(() => {
                currentIndex++;
                if(currentIndex < challengeQuestions.length) showQuestion();
                else alert(`Challenge terminé ! Score : ${score}/${challengeQuestions.length}`);
            }, 1500);
        }
    </script>
</body>
</html>
