<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ActuQuiz Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <header class="max-w-5xl mx-auto flex justify-between items-center mb-12">
        <h1 class="text-4xl font-black italic underline decoration-blue-500">ActuQuiz.</h1>
        <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold">SUPER QUIZ ⚡</button>
    </header>
    <div id="grid" class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8"></div>

    <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-10 rounded-[2rem] max-w-md w-full">
            <h2 class="text-2xl font-black mb-6">Paramètres du SuperQuiz</h2>
            <input type="range" id="qty" min="5" max="50" value="20" class="w-full mb-4">
            <p class="mb-8 text-sm">Questions : <span id="val">20</span></p>
            <button onclick="window.location.href='superquiz.html'" class="...">
            SUPER QUIZ
            </button>
            <a href="superquiz.html" class="...">
            SUPER QUIZ
            </a>
        </div>
    </div>

    <script>
        document.getElementById('qty').oninput = function() { document.getElementById('val').innerText = this.value; }
        async function load() {
            const res = await fetch('manifest.json');
            const data = await res.json();
            const grid = document.getElementById('grid');
            data.reverse().forEach(item => {
                grid.innerHTML += `
                <a href="quiz.html?folder=${item.folder}" class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition block">
                    <img src="${item.img}" class="h-52 w-full object-cover">
                    <div class="p-6">
                        <span class="text-blue-600 font-bold text-xs uppercase">${item.date}</span>
                        <h2 class="text-xl font-bold mt-2">${item.titre}</h2>
                    </div>
                </a>`;
            });
        }
        function launch() { window.location.href = `superquiz.html?qty=${document.getElementById('qty').value}`; }
        load();
    </script>
</body>
</html>
