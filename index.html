<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActuQuiz Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 pb-24 text-slate-900">

<header class="max-w-5xl mx-auto flex justify-between items-center mb-12">
        <h1 class="text-4xl font-black italic underline decoration-blue-500 tracking-tighter cursor-pointer" onclick="location.reload()">ActuQuiz.</h1>
        
        <div class="flex items-center gap-5 md:gap-8">
            <a href="https://www.youtube.com/c/VUFranceTV" target="_blank" class="group flex flex-col items-center leading-none transition-all">
                <span class="text-xl md:text-2xl font-[900] tracking-tighter text-slate-600 group-hover:text-[#00FF00] transition-all duration-300">
                    V<span class="ml-[-2px]">U</span>
                </span>
                <span class="text-[7px] md:text-[8px] font-black tracking-[0.3em] mt-1 text-slate-500 group-hover:text-slate-900 transition-colors uppercase">
                    ARTE
                </span>
            </a>

            <a href="superquiz.html" class="bg-blue-600 text-white px-4 py-3 md:px-8 md:py-4 rounded-xl md:rounded-2xl font-black text-xs md:text-sm shadow-xl hover:scale-105 active:scale-95 transition flex items-center gap-2">
                SUPER QUIZ <span class="hidden md:inline">⚡</span>
            </a>
        </div>
    </header>

    <div id="grid" class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10"></div>

    <div class="max-w-5xl mx-auto mt-16 flex justify-center items-center gap-10">
        <button id="prev-btn" onclick="changePage(-1)" class="p-2 text-slate-300 hover:text-blue-600 disabled:opacity-10 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <span id="page-indicator" class="text-[11px] font-black text-slate-400 tracking-widest uppercase">PAGE 1</span>
        <button id="next-btn" onclick="changePage(1)" class="p-2 text-slate-300 hover:text-blue-600 disabled:opacity-10 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
        </button>
    </div>

    <div id="history-section" class="max-w-5xl mx-auto mt-24 hidden">
        <div class="flex justify-between items-end mb-8 border-t pt-12 border-slate-200">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter">Tes derniers scores</h2>
            <button onclick="if(confirm('Effacer l\'historique ?')){localStorage.clear(); location.reload();}" class="text-[9px] font-black uppercase tracking-widest text-slate-300 hover:text-red-500 transition italic">
                🗑 Effacer
            </button>
        </div>
        <div id="history-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            </div>
    </div>

    <script>
        let allData = [];
        let currentPage = 1;
        const itemsPerPage = 6;

        async function load() {
            try {
                const res = await fetch('manifest.json?v=' + Date.now());
                allData = await res.json();
                allData.reverse(); // Plus récent en premier
                renderGrid();
                loadHistory(); // Charger l'historique au démarrage
            } catch (e) { 
                console.error(e); 
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            const startIndex = (currentPage - 1) * itemsPerPage;
            const slice = allData.slice(startIndex, startIndex + itemsPerPage);

            grid.innerHTML = slice.map(item => `
                <a href="quiz.html?folder=${item.folder}" class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 block group border border-slate-100">
                    <div class="relative overflow-hidden h-52">
                        <img src="${item.img}" class="h-full w-full object-cover group-hover:scale-105 transition duration-700">
                        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest text-blue-600 italic">
                            ${item.date}
                        </div>
                    </div>
                    <div class="p-8">
                        <h2 class="text-2xl font-black leading-tight italic tracking-tighter group-hover:text-blue-600 transition">${item.titre}</h2>
                    </div>
                </a>
            `).join('');

            updatePagination();
        }

        function updatePagination() {
            const totalPages = Math.ceil(allData.length / itemsPerPage);
            document.getElementById('prev-btn').disabled = (currentPage === 1);
            document.getElementById('next-btn').disabled = (currentPage >= totalPages);
            document.getElementById('page-indicator').innerText = `PAGE ${currentPage} / ${totalPages}`;
        }

        function changePage(step) {
            currentPage += step;
            renderGrid();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- NOUVELLE FONCTION POUR L'HISTORIQUE ---
        function loadHistory() {
            const historique = JSON.parse(localStorage.getItem('actuquiz_scores')) || [];
            const section = document.getElementById('history-section');
            const list = document.getElementById('history-list');

            if (historique.length > 0) {
                section.classList.remove('hidden');
                list.innerHTML = historique.map(s => `
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex justify-between items-center">
                        <div>
                            <p class="text-[9px] font-black text-blue-600 uppercase italic tracking-widest">${s.titre}</p>
                            <p class="text-[10px] font-bold text-slate-400">${s.date}</p>
                        </div>
                        <div class="text-2xl font-black italic text-slate-800">${s.score}<span class="text-slate-300 text-sm">/${s.total}</span></div>
                    </div>
                `).join('');
            }
        }

        load();
    </script>
</body>
</html>
