<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture ActuQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: white; scroll-behavior: smooth; }
        .quiz-card { min-height: 500px; display: flex; flex-direction: column; }
    </style>
</head>
<body class="pb-20 text-slate-900">

    <nav id="top" class="p-6 max-w-2xl mx-auto flex justify-between items-center">
        <a href="index.html" class="text-blue-600 font-black uppercase text-[10px] tracking-widest italic">← Retour</a>
        
        <button onclick="document.getElementById('quiz-ui').scrollIntoView({behavior:'smooth'})" class="bg-slate-900 text-white px-4 py-2 rounded-full font-black text-[9px] uppercase tracking-widest hover:bg-blue-600 transition">
            Aller au Quiz ⚡
        </button>
    </nav>

    <article id="content" class="max-w-2xl mx-auto p-6 prose prose-slate lg:prose-xl mb-12 border-b border-slate-100 pb-12"></article>
    
    <div id="quiz-ui" class="max-w-xl mx-auto px-6 relative">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic underline decoration-blue-500 tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">ActuQuiz.</h1>
        </div>

        <div class="flex justify-between items-center mb-4 px-2">
            <a href="index.html" class="text-blue-600 font-black uppercase text-[10px] tracking-widest italic">
                ← Retour
            </a>
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="text-blue-600 font-black text-[9px] uppercase tracking-widest hover:underline italic">
                ↑ Lire l'article
            </button>
        </div>

        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 relative">
            <div class="quiz-card">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex gap-2">
                        <span id="theme-tag" class="bg-blue-100 text-[9px] font-black px-3 py-1 rounded-full text-blue-600 uppercase tracking-widest italic">THÈME</span>
                    </div>
                    <span id="progress-text" class="text-xs font-black text-slate-300 font-mono italic">01/05</span>
                </div>

                <div id="quiz-content" class="flex-grow">
                    <h2 id="question-text" class="text-xl md:text-2xl font-bold text-slate-800 mb-6 leading-tight italic">Chargement...</h2>
                    <div id="options" class="grid grid-cols-1 gap-3 mb-6"></div>
                    
                    <div id="explanation-box" class="hidden p-5 bg-blue-50 rounded-2xl border-l-4 border-blue-500 animate-in fade-in slide-in-from-bottom-2">
                        <p class="text-[10px] font-black uppercase text-blue-600 mb-1 tracking-widest italic">L'explication :</p>
                        <p id="explanation-text" class="text-sm text-slate-700 leading-relaxed font-medium italic"></p>
                    </div>
                </div>

                <button id="next-btn" onclick="nextQuestion()" class="hidden mt-6 w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-xl active:scale-95 transition italic">
                    CONTINUER ➔
                </button>
            </div>
        </div>
    </div>

    <div id="score-ui" class="hidden max-w-xl mx-auto bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100 text-center mt-10">
        <h2 class="text-3xl font-black text-slate-900 mb-2 italic uppercase">Terminé !</h2>
        <div id="final-score-text" class="text-5xl font-black text-blue-600 my-8 italic">0/0</div>
        <div id="theme-details" class="space-y-4 mb-10 text-left"></div>
        <button onclick="window.location.href='index.html'" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl italic transition shadow-lg">RETOURNER AUX ACTUS</button>
    </div>

    <script>
        const folder = new URLSearchParams(window.location.search).get('folder');
        let questions = [], currentIdx = 0, score = 0, themeScores = {};

        async function init() {
            try {
                const resHtml = await fetch(`${folder}/contenu.html?v=${Date.now()}`);
                if (resHtml.ok) document.getElementById('content').innerHTML = await resHtml.text();
                const resJson = await fetch(`${folder}/metadata.json?v=${Date.now()}`);
                const data = await resJson.json();
                questions = data.questions;
                render();
            } catch(e) { console.error(e); }
        }

        function render() {
            const q = questions[currentIdx];
            document.getElementById('theme-tag').innerText = q.theme;
            document.getElementById('progress-text').innerText = `${String(currentIdx + 1).padStart(2, '0')}/${questions.length}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            const container = document.getElementById('options');
            container.innerHTML = "";
            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 font-bold hover:bg-slate-50 transition italic text-sm";
                b.innerText = opt;
                b.onclick = () => check(i);
                container.appendChild(b);
            });
        }

        function check(idx) {
            const q = questions[currentIdx];
            const btns = document.getElementById('options').children;
            for(let b of btns) b.onclick = null;
            if(!themeScores[q.theme]) themeScores[q.theme] = { correct: 0, total: 0 };
            themeScores[q.theme].total++;

            if(idx === q.correct) {
                btns[idx].classList.replace('border-slate-100', 'border-green-500');
                btns[idx].classList.add('bg-green-50', 'text-green-700');
                score++; themeScores[q.theme].correct++;
            } else {
                btns[idx].classList.replace('border-slate-100', 'border-red-500');
                btns[idx].classList.add('bg-red-50', 'text-red-700');
                btns[q.correct].classList.replace('border-slate-100', 'border-green-500');
                btns[q.correct].classList.add('bg-green-50', 'text-green-700');
            }

            document.getElementById('explanation-text').innerText = q.explication;
            document.getElementById('explanation-box').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            
            // SCROLL DE 25 PIXELS (Comme sur superquiz)
            setTimeout(() => {
                const btn = document.getElementById('next-btn');
                const yOffset = 25; 
                const y = btn.getBoundingClientRect().top + window.pageYOffset + yOffset;
                window.scrollTo({ top: y, behavior: 'smooth' });
            }, 100);
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < questions.length) {
                render();
                // Remonte au début du quiz pour la nouvelle question
                document.getElementById('quiz-ui').scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                showFinalScore();
            }
        }

        function showFinalScore() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('score-ui').classList.remove('hidden');
            document.getElementById('final-score-text').innerText = `${score}/${questions.length}`;
            const details = document.getElementById('theme-details');
            details.innerHTML = "";
            for(let t in themeScores) {
                const s = themeScores[t];
                const p = Math.round((s.correct / s.total) * 100);
                details.innerHTML += `<div class="flex flex-col gap-1 mb-4"><div class="flex justify-between text-[10px] font-black uppercase italic"><span class="text-slate-400">${t}</span><span class="text-blue-600">${s.correct}/${s.total}</span></div><div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-500 transition-all duration-1000" style="width: ${p}%"></div></div></div>`;
            }
            document.getElementById('score-ui').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        init();
    </script>
</body>
</html>
