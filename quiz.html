<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lecture ActuQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white pb-20">
    <nav class="p-6"><a href="index.html" class="text-blue-600 font-bold">← Retour</a></nav>
    <article id="content" class="max-w-2xl mx-auto p-6 prose lg:prose-xl"></article>
    
    <div class="max-w-2xl mx-auto p-6 bg-slate-50 rounded-[2rem] mt-10">
        <h2 class="text-2xl font-black mb-8 text-center uppercase tracking-widest">Le Quiz du jour</h2>
        <div id="quiz-zone"></div>
    </div>

    <script>
        const folder = new URLSearchParams(window.location.search).get('folder');
        async function init() {
            // Charger l'article
            const resHtml = await fetch(`${folder}/contenu.html`);
            document.getElementById('content').innerHTML = await resHtml.text();
            
            // Charger le Quiz
            const resJson = await fetch(`${folder}/metadata.json`);
            const data = await resJson.json();
            const zone = document.getElementById('quiz-zone');
            
            data.questions.forEach((q, i) => {
                let opts = q.options.map((o, idx) => `<button onclick="check(this, ${idx==q.correct}, '${q.explication.replace(/'/g, "\\'")}')" class="block w-full text-left p-4 mb-2 bg-white border rounded-xl hover:bg-blue-50">${o}</button>`).join('');
                zone.innerHTML += `<div class="mb-10"><p class="font-bold mb-4">${i+1}. ${q.q} <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded ml-2">${q.theme}</span></p>${opts}<p class="expl hidden mt-2 text-sm text-slate-500 italic"></p></div>`;
            });
        }
        function check(btn, isCorrect, expl) {
            btn.style.backgroundColor = isCorrect ? '#dcfce7' : '#fee2e2';
            const p = btn.parentElement.querySelector('.expl');
            p.innerText = (isCorrect ? "✅ " : "❌ ") + expl;
            p.classList.remove('hidden');
        }
        init();
    </script>
</body>
</html>
