<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture ActuQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .progress-bar { transition: width 0.4s ease-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white pb-20 text-slate-900">

    <nav class="p-6 max-w-2xl mx-auto">
        <a href="index.html" class="text-blue-600 font-black uppercase text-[10px] tracking-widest italic">← Retour au Hub</a>
    </nav>

    <article id="content" class="max-w-2xl mx-auto p-6 prose prose-slate lg:prose-xl mb-12 border-b border-slate-100 pb-12"></article>
    
    <div id="quiz-container" class="max-w-xl mx-auto p-6 md:p-10 bg-slate-900 rounded-[2.5rem] text-white shadow-2xl relative">
        
        <button onclick="this.parentElement.style.display='none'" class="absolute top-6 right-6 text-white/20 hover:text-white transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>

        <div id="quiz-interface">
            <div class="flex justify-between items-center mb-8">
                <span id="step-label" class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-400">Question 1</span>
                <span id="theme-label" class="text-[9px] font-black uppercase bg-white/10 px-3 py-1 rounded-full text-slate-300">Thème</span>
            </div>

            <h2 id="question-text" class="text-xl md:text-2xl font-black mb-8 leading-tight italic">Chargement...</h2>

            <div id="options-zone" class="space-y-3"></div>

            <div id="explanation-zone" class="hidden mt-8 p-6 bg-white/5 rounded-3xl border border-white/10">
                <p id="result-status" class="font-black uppercase text-[11px] mb-2 tracking-widest"></p>
                <p id="explanation-text" class="text-sm text-slate-300 italic leading-relaxed mb-6"></p>
                <button id="btn-next" onclick="nextStep()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase italic tracking-widest hover:bg-blue-500 transition shadow-lg">
                    Continuer ➔
                </button>
            </div>
        </div>

        <div id="result-screen" class="hidden text-center py-6">
            <h2 class="text-3xl font-black mb-2 italic uppercase">Terminé !</h2>
            <p class="text-blue-400 font-black uppercase text-[10px] tracking-[0.2em] mb-8 italic">Ton score sur cet article</p>
            
            <div class="text-6xl font-black text-white mb-10 tracking-tighter" id="final-score">0/0</div>

            <div id="theme-details" class="space-y-4 mb-10 text-left">
                </div>

            <button onclick="location.href='index.html'" class="w-full bg-white text-slate-900 py-5 rounded-2xl font-black uppercase italic tracking-widest hover:bg-blue-600 hover:text-white transition">RETOURNER AU HUB</button>
        </div>
    </div>

    <script>
        const folder = new URLSearchParams(window.location.search).get('folder');
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let themeScores = {};

        async function init() {
            try {
                const resHtml = await fetch(`${folder}/contenu.html?v=${Date.now()}`);
                if (resHtml.ok) document.getElementById('content').innerHTML = await resHtml.text();

                const resJson = await fetch(`${folder}/metadata.json?v=${Date.now()}`);
                const data = await resJson.json();
                questions = data.questions;
                renderQuestion();
            } catch (err) { console.error(err); }
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            document.getElementById('step-label').innerText = `Question ${currentIndex + 1} / ${questions.length}`;
            document.getElementById('theme-label').innerText = q.theme;
            document.getElementById('question-text').innerText = q.q;
            
            const zone = document.getElementById('options-zone');
            zone.innerHTML = "";
            document.getElementById('explanation-zone').classList.add('hidden');

            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 bg-white/5 border border-white/10 rounded-2xl font-bold text-sm hover:bg-white/10 transition-all";
                btn.innerText = opt;
                btn.onclick = () => check(idx, q.correct, q.explication, btn);
                zone.appendChild(btn);
            });
        }

        function check(idx, correct, expl, btn) {
            const q = questions[currentIndex];
            if (!themeScores[q.theme]) themeScores[q.theme] = { correct: 0, total: 0 };
            themeScores[q.theme].total++;

            const isCorrect = (idx === correct);
            if (isCorrect) {
                score++;
                themeScores[q.theme].correct++;
                btn.classList.add('bg-green-500/20', 'border-green-500', 'text-green-400');
            } else {
                btn.classList.add('bg-red-500/20', 'border-red-500', 'text-red-400');
                // Montrer la bonne réponse en vert
                const allBtns = document.getElementById('options-zone').querySelectorAll('button');
                allBtns[correct].classList.add('bg-green-500/20', 'border-green-500', 'text-green-400');
            }

            document.getElementById('options-zone').querySelectorAll('button').forEach(b => b.onclick = null);
            
            // Remplir l'explication
            document.getElementById('result-status').innerText = isCorrect ? "✅ BRAVO" : "❌ ERREUR";
            document.getElementById('result-status').className = `font-black uppercase text-[11px] mb-2 tracking-widest ${isCorrect ? 'text-green-500' : 'text-red-500'}`;
            document.getElementById('explanation-text').innerText = expl;
            
            const expZone = document.getElementById('explanation-zone');
            expZone.classList.remove('hidden');

            // SCROLL DOWN : On descend pour voir l'explication et le bouton Continuer
            setTimeout(() => {
                const offset = expZone.offsetTop + expZone.offsetHeight - window.innerHeight + 40;
                window.scrollTo({ top: offset, behavior: 'smooth' });
            }, 100);
        }

        function nextStep() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
                // Remonter un peu pour voir la nouvelle question
                document.getElementById('quiz-container').scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                showFinal();
            }
        }

        function showFinal() {
            document.getElementById('quiz-interface').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score}/${questions.length}`;
            
            const details = document.getElementById('theme-details');
            details.innerHTML = "";
            for (let t in themeScores) {
                const s = themeScores[t];
                const p = Math.round((s.correct / s.total) * 100);
                details.innerHTML += `
                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between text-[10px] font-black uppercase italic">
                            <span class="text-slate-400">${t}</span>
                            <span class="text-blue-400">${s.correct}/${s.total}</span>
                        </div>
                        <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500 transition-all duration-1000" style="width: ${p}%"></div>
                        </div>
                    </div>`;
            }
            document.getElementById('quiz-container').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        init();
    </script>
</body>
</html>
