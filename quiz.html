<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActuQuiz - Le Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* Cacher la scrollbar mais garder le défilement */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-filter { background-color: #2563eb !important; color: white !important; border-color: #2563eb !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <h1 class="text-3xl font-black italic underline decoration-blue-500 text-slate-900 tracking-tighter">ActuQuiz.</h1>
        <button onclick="window.location.href='superquiz.html'" class="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-[10px] shadow-lg hover:scale-105 transition italic uppercase tracking-widest">
            SUPER QUIZZ ⚡
        </button>
    </header>

    <div class="max-w-4xl mx-auto mb-10">
        <div id="filters-container" class="flex gap-2 overflow-x-auto no-scrollbar py-2">
            </div>
    </div>

    <div id="grid" class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12">
        </div>

    <script>
        let allNews = [];

        async function init() {
            try {
                const res = await fetch('manifest.json');
                allNews = await res.json();
                
                // On prépare les filtres
                createFilters();
                
                // On affiche par défaut le premier mois disponible (le plus récent)
                if(allNews.length > 0) {
                    const firstDate = allNews[0].date; // ex: "Lundi 2 Mars 2026"
                    const firstMonthYear = extractMonthYear(firstDate);
                    filterNews(firstMonthYear);
                }

            } catch (e) {
                console.error(e);
                document.getElementById('grid').innerHTML = "<p class='text-slate-400 font-bold text-center col-span-2'>Erreur de chargement.</p>";
            }
        }

        // Extrait "Mars 2026" d'une chaîne "Lundi 2 Mars 2026"
        function extractMonthYear(dateStr) {
            const parts = dateStr.split(' ');
            if (parts.length >= 4) {
                return `${parts[2]} ${parts[3]}`; // Mois + Année
            }
            return dateStr;
        }

        function createFilters() {
            const container = document.getElementById('filters-container');
            // Créer une liste unique de Mois + Année
            const uniqueMonths = [...new Set(allNews.map(item => extractMonthYear(item.date)))];

            container.innerHTML = uniqueMonths.map(my => `
                <button onclick="filterNews('${my}')" 
                        class="filter-btn whitespace-nowrap px-6 py-2 rounded-xl bg-white border border-slate-200 text-[11px] font-black uppercase tracking-widest text-slate-500 hover:border-blue-500 transition shadow-sm italic"
                        data-monthyear="${my}">
                    ${my}
                </button>
            `).join('');
        }

        function filterNews(monthYear) {
            // UI : Activer le bouton
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active-filter');
                if(btn.getAttribute('data-monthyear') === monthYear) btn.classList.add('active-filter');
            });

            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            const filtered = allNews.filter(item => extractMonthYear(item.date) === monthYear);

            filtered.forEach(item => {
                grid.innerHTML += `
                <a href="quiz.html?folder=${item.folder}" class="group block">
                    <div class="overflow-hidden rounded-[2.5rem] bg-white border border-slate-100 shadow-sm hover:shadow-2xl transition-all duration-500">
                        <div class="h-64 md:h-72 overflow-hidden">
                            <img src="${item.img}" class="h-full w-full object-cover group-hover:scale-105 transition duration-700">
                        </div>
                        <div class="p-8">
                            <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-3 italic">${item.date}</p>
                            <h2 class="text-2xl font-bold leading-tight text-slate-800 group-hover:text-blue-600 transition italic">${item.titre}</h2>
                            <div class="flex items-center gap-2 mt-6 text-slate-300 group-hover:text-blue-600 transition">
                                <span class="text-[9px] font-black uppercase tracking-[0.2em] italic">Commencer le Quiz</span>
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </a>`;
            });
        }

        init();
    </script>
</body>
</html>
