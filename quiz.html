<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture ActuQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .progress-bar { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-white pb-20">
    <nav class="p-6 max-w-2xl mx-auto">
        <a href="index.html" class="text-blue-600 font-black uppercase text-[10px] tracking-widest hover:underline">← Retour au Hub</a>
    </nav>

    <article id="content" class="max-w-2xl mx-auto p-6 prose prose-slate lg:prose-xl mb-12 border-b border-slate-100 pb-12"></article>
    
    <div id="quiz-container" class="max-w-xl mx-auto p-6 md:p-10 bg-slate-900 rounded-[2.5rem] text-white shadow-2xl overflow-hidden relative">
        
        <div class="absolute top-0 left-0 w-full h-1.5 bg-white/10">
            <div id="progress" class="progress-bar h-full bg-blue-500" style="width: 0%"></div>
        </div>

        <div id="quiz-interface">
            <div class="flex justify-between items-center mb-8">
                <span id="step-label" class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-400">Question 1</span>
                <span id="theme-label" class="text-[9px] font-black uppercase bg-white/10 px-3 py-1 rounded-full">Thème</span>
            </div>

            <h2 id="question-text" class="text-xl md:text-2xl font-black mb-8 leading-tight italic tracking-tight">Chargement du quiz...</h2>

            <div id="options-zone" class="space-y-3"></div>

            <div id="explanation-zone" class="hidden mt-8 p-5 bg-white/5 rounded-2xl border border-white/10 animate-in fade-in slide-in-from-bottom-4">
                <p id="result-status" class="font-black uppercase text-[10px] mb-2"></p>
                <p id="explanation-text" class="text-sm text-slate-300 italic leading-relaxed"></p>
                <button onclick="nextStep()" class="mt-6 w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase italic tracking-widest hover:bg-blue-500 transition">Question suivante ➔</button>
            </div>
        </div>

        <div id="result-screen" class="hidden text-center py-10">
            <div class="text-6xl mb-6">🏆</div>
            <h2 class="text-3xl font-black mb-2 italic">Terminé !</h2>
            <p id="final-score-text" class="text-5xl font-black text-blue-500 mb-8 tracking-tighter">0 / 0</p>
            <div id="recap-list" class="text-left space-y-2 mb-8 max-h-40 overflow-y-auto no-scrollbar bg-white/5 p-4 rounded-2xl"></div>
            <button onclick="location.href='index.html'" class="w-full bg-white text-slate-900 py-4 rounded-xl font-black uppercase italic tracking-widest hover:bg-blue-500 hover:text-white transition">Retour au Hub</button>
        </div>
    </div>

    <script>
        const folder = new URLSearchParams(window.location.search).get('folder');
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let userResults = [];

        async function init() {
            try {
                // 1. Charger l'article
                const resHtml = await fetch(`${folder}/contenu.html?v=${Date.now()}`);
                if (resHtml.ok) document.getElementById('content').innerHTML = await resHtml.text();

                // 2. Charger le Quiz
                const resJson = await fetch(`${folder}/metadata.json?v=${Date.now()}`);
                const data = await resJson.json();
                questions = data.questions;
                showQuestion();
            } catch (err) {
                console.error(err);
                document.getElementById('question-text').innerText = "Erreur de chargement.";
            }
        }

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('step-label').innerText = `Question ${currentIndex + 1} / ${questions.length}`;
            document.getElementById('theme-label').innerText = q.theme;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress').style.width = `${((currentIndex) / questions.length) * 100}%`;
            
            const optionsZone = document.getElementById('options-zone');
            optionsZone.innerHTML = "";
            document.getElementById('explanation-zone').classList.add('hidden');
            optionsZone.classList.remove('hidden');

            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 bg-white/5 border border-white/10 rounded-2xl font-bold text-sm hover:bg-white/10 hover:border-blue-500 transition-all";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, q.correct, q.explication, btn);
                optionsZone.appendChild(btn);
            });
        }

        function checkAnswer(idx, correct, expl, btn) {
            const isCorrect = (idx === correct);
            if(isCorrect) score++;
            
            userResults.push({ q: questions[currentIndex].q, success: isCorrect });

            // Désactiver les boutons
            const btns = document.getElementById('options-zone').querySelectorAll('button');
            btns.forEach(b => b.disabled = true);

            // Style du bouton cliqué
            btn.style.borderColor = isCorrect ? '#22c55e' : '#ef4444';
            btn.style.backgroundColor = isCorrect ? 'rgba(34, 197, 94, 0.2)' : 'rgba(239, 68, 68, 0.2)';

            // Afficher explication
            document.getElementById('result-status').innerText = isCorrect ? "✅ Bonne réponse" : "❌ Mauvaise réponse";
            document.getElementById('result-status').style.color = isCorrect ? "#22c55e" : "#ef4444";
            document.getElementById('explanation-text').innerText = expl;
            document.getElementById('explanation-zone').classList.remove('hidden');
        }

        function nextStep() {
            currentIndex++;
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                showFinalScore();
            }
        }

        function showFinalScore() {
            document.getElementById('progress').style.width = "100%";
            document.getElementById('quiz-interface').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score-text').innerText = `${score} / ${questions.length}`;
            
            const recap = document.getElementById('recap-list');
            recap.innerHTML = userResults.map(r => `
                <div class="text-[10px] font-bold border-b border-white/5 py-2 flex justify-between">
                    <span class="truncate pr-4">${r.q}</span>
                    <span>${r.success ? '✅' : '❌'}</span>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
